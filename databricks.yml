# This is a Databricks asset bundle definition for retailrocket.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: retailrocket
  uuid: 30722e4d-e9d5-430d-abe7-1fa81373d7cd

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405611166007865.5.azuredatabricks.net
    variables:
      catalog: adb_workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-7405611166007865.5.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/subamsarkar.work@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/subamsarkar.work@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: adb_workspace
      schema: prod
    permissions:
      - user_name: subamsarkar.work@gmail.com
        level: CAN_MANAGE
